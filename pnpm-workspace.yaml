packages:
  - web

allowBuilds:
  '@prisma/engines': true
  esbuild: true
  prisma: true
  re2: true
  unrs-resolver: true
  '@prisma/client': true
  puppeteer: false

minimumReleaseAgeExclude:
  - '@hono/node-server@1.19.13'
  - esbuild@0.28.1
  - form-data@4.0.6
  - js-yaml@4.1.2
  - '@babel/core@7.29.1'

overrides:
  '@hono/node-server@<1.19.13': ^1.19.13
  hono@<4.11.10: '>=4.11.10'
  hono@<4.11.7: '>=4.11.7'
  js-yaml@<=4.1.1: ^4.1.2
  lodash@>=4.0.0 <=4.17.22: '>=4.17.23'
  minimatch@<10.2.1: '>=10.2.1'
